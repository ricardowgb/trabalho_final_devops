name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:

  test:
    name: Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependências do backend
        run: |
          cd backend
          npm install

      - name: Executar testes
        run: |
          cd backend
          npm test

  build:
    name: Build da Aplicação
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build do backend
        run: |
          cd backend
          npm install

      - name: Validar docker-compose
        run: docker compose config

  docker:
    name: Build e Push Docker
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push do Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Build e Push do Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest

  deploy:
    name: Deploy Automatizado
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Simular deploy
        run: |
          echo "Realizando deploy da aplicação..."
          docker compose -f docker-compose.yml config
          echo "Deploy realizado com sucesso!"

      - name: Rollback em caso de falha
        if: failure()
        run: |
          echo "Deploy falhou — iniciando rollback..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest || true
          echo "Rollback concluído."